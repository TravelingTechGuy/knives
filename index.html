<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Traveling Tech Guy">
  <meta name="copyright" content="© 2026 Traveling Tech Guy LLC">
  <link rel="icon" type="image/svg+xml" href="icons/favicon.svg">
  <title>Knife Steels Catalog</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header>
    <div class="header-controls">
      <button id="theme-toggle" class="theme-toggle-btn" title="Toggle theme"></button>
    </div>
    <h1>
      <img src="icons/favicon.svg" alt="Knife icon" class="title-icon">
      <span>Knife Steels Catalog</span>
      <img src="icons/favicon.svg" alt="Knife icon" class="title-icon title-icon-mirrored">
    </h1>
    <div class="search-container">
      <div class="search-wrapper">
        <input type="text" id="steel-search" placeholder="Filter steels (e.g. M390, toughness > 7)...">
        <button id="clear-filter" class="clear-btn" title="Clear filter">
          <img src="icons/icon-clear.svg" alt="Clear" />
        </button>
      </div>
      <div class="filter-hints">
        <div class="filter-hint">Try: <b>M390, MagnaCut</b> or <b>toughness > 7, corrosion > 8</b></div>
        <div class="filter-hint">Tip: You can also filter by tier, like "Budget, Super Steel"</div>
      </div>
    </div>
  </header>

  <div id="database-info" class="database-info">
    <span id="steel-count"></span>
    <div class="sort-container">
      <label for="sort-select">Sort by:</label>
      <select id="sort-select">
        <option value="name">Name</option>
        <option value="tier">Budget Tier</option>
        <option value="corrosion">Corrosion Resistance</option>
        <option value="retention">Edge Retention</option>
        <option value="sharpening">Sharpening Ease</option>
        <option value="toughness">Toughness</option>
      </select>
    </div>
  </div>

  <div id="steel-grid" class="grid"></div>

  <script type="module" src="app.js?v=1.0.1"></script>
</body>

</html>
