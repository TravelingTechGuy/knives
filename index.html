<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Traveling Tech Guy">
  <meta name="copyright" content="© 2026 Traveling Tech Guy LLC">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>Knife Steel Performance</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header>
    <h1>
      <img src="favicon.svg" alt="Knife icon" class="title-icon">Knife Steel Performance
    </h1>
    <div class="search-container">
      <div class="search-wrapper">
        <input type="text" id="steel-search" placeholder="Filter steels (e.g. M390, toughness > 7)...">
        <button id="clear-search" class="clear-btn" title="Clear search">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="filter-hints">
        <div class="filter-hint">Try: <b>M390, MagnaCut</b> or <b>toughness > 7, corrosion > 8</b></div>
        <div class="filter-hint">Tip: You can also filter by tier, like "Budget, Super Steel"</div>
      </div>
    </div>
  </header>

  <div id="database-info" class="database-info">
    <span id="steel-count"></span>
    <div class="sort-container">
      <label for="sort-select">Sort by:</label>
      <select id="sort-select">
        <option value="name">Name</option>
        <option value="tier">Budget Tier</option>
        <option value="corrosion">Corrosion Resistance</option>
        <option value="retention">Edge Retention</option>
        <option value="sharpening">Sharpening Ease</option>
        <option value="toughness">Toughness</option>
      </select>
    </div>
  </div>

  <div id="steel-grid" class="grid"></div>

  <script type="module" src="app.js?v=1.0.0"></script>
</body>

</html>
